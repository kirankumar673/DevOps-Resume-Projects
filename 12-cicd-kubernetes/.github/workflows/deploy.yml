name: Deploy To Kubernetes

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Prevent overlapping deployments
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Build and push Docker image
  # ─────────────────────────────────────────────
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Image Tag (git SHA)
        id: tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/python-app:${{ steps.tag.outputs.tag }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/python-app:${{ steps.tag.outputs.tag }} \
                     ${{ secrets.DOCKER_USERNAME }}/python-app:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/python-app:${{ steps.tag.outputs.tag }}
          docker push ${{ secrets.DOCKER_USERNAME }}/python-app:latest
          echo "✅ Image pushed: ${{ secrets.DOCKER_USERNAME }}/python-app:${{ steps.tag.outputs.tag }}"

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to Kubernetes (main branch only)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create Namespace (if not exists)
        run: |
          kubectl create namespace cicd-demo --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml

      - name: Update Image Tag
        run: |
          kubectl set image deployment/python-app \
            python-app=${{ secrets.DOCKER_USERNAME }}/python-app:${{ needs.build.outputs.image_tag }} \
            -n cicd-demo

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/python-app -n cicd-demo --timeout=120s
          echo "✅ Deployment rolled out successfully"

      - name: Verify Pods
        run: |
          kubectl get pods -n cicd-demo
          kubectl get svc -n cicd-demo
