version: '3.8'

services:
  nexus:
    image: sonatype/nexus3:3.67.1
    container_name: nexus
    restart: unless-stopped
    ports:
      - "8081:8081"   # Nexus UI
      - "8082:8082"   # Docker hosted repository
    volumes:
      - nexus-data:/nexus-data
    environment:
      - INSTALL4J_ADD_VM_PARAMS=-Xms1g -Xmx2g -XX:MaxDirectMemorySize=2g

volumes:
  nexus-data:
    driver: local
