apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-app
  namespace: enterprise-devsecops
  labels:
    app: enterprise-app
    version: "1.0.0"

spec:
  replicas: 2

  selector:
    matchLabels:
      app: enterprise-app

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0       # Zero-downtime rolling updates

  template:
    metadata:
      labels:
        app: enterprise-app

    spec:
      containers:
      - name: enterprise-app
        image: NEXUS_HOST:8082/enterprise-app:IMAGE_TAG   # Updated by Jenkins GitOps stage

        ports:
        - containerPort: 5000

        env:
        - name: APP_VERSION
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['version']
        - name: ENVIRONMENT
          value: "production"

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
