apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: voting-app
type: Opaque
# Values are base64 encoded. To encode: echo -n "yourvalue" | base64
# admin   -> YWRtaW4=
# password -> cGFzc3dvcmQ=  (CHANGE THIS in production!)
# votes   -> dm90ZXM=
stringData:
  POSTGRES_USER: admin
  POSTGRES_PASSWORD: changeme_strong_password
  POSTGRES_DB: votes
