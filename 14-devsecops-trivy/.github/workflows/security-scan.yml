name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:

  security-scan:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Build Image
      run: |
        docker build -t app:latest .

    - name: Run Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: app:latest
        format: table
        exit-code: 1
        severity: HIGH,CRITICAL
